<!DOCTYPE html>
<html>
<head>
    <title>Student Fee Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .login-container, .data-container { max-width: 500px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-container { max-width: 800px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1a252f; }
        .error { color: red; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c3e50; color: white; }
        .logout { float: right; }
    </style>
</head>
<body>
    <div id="loginDiv" class="login-container">
        <h2>Student Login</h2>
        <input type="text" id="studentId" placeholder="Student ID" />
        <input type="text" id="name" placeholder="Full Name" />
        <input type="text" id="mobile" placeholder="Mobile Number" />
        <button onclick="login()">Login</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="dataDiv" class="data-container" style="display:none;">
        <h2>Your Fee Details <button class="logout" onclick="logout()">Logout</button></h2>
        <div id="studentInfo"></div>
        <div id="feeTable"></div>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycby4D-wrff-70DVGCOfCecKznqo7Eqd14vwXkUcVBAg6kZxYyxAtyj3yecmgPT_UcaRb/exec'; // Replace with your deployed URL
        let currentStudentId = null;

        async function login() {
            const studentId = document.getElementById('studentId').value.trim();
            const name = document.getElementById('name').value.trim();
            const mobile = document.getElementById('mobile').value.trim();

            if (!studentId || !name || !mobile) {
                document.getElementById('loginError').innerText = 'All fields required';
                return;
            }

            try {
                const url = `${scriptUrl}?action=validateStudent&studentId=${encodeURIComponent(studentId)}&name=${encodeURIComponent(name)}&mobile=${encodeURIComponent(mobile)}`;
                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                    currentStudentId = studentId;
                    document.getElementById('loginDiv').style.display = 'none';
                    document.getElementById('dataDiv').style.display = 'block';
                    loadStudentData();
                } else {
                    document.getElementById('loginError').innerText = result.error || 'Invalid credentials';
                }
            } catch (err) {
                document.getElementById('loginError').innerText = 'Login failed. Try again.';
            }
        }

        async function loadStudentData() {
            try {
                const url = `${scriptUrl}?action=getStudentFeeData&studentId=${encodeURIComponent(currentStudentId)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('feeTable').innerHTML = `<p class="error">${data.error}</p>`;
                    return;
                }

                // Build fee table
                let html = '<table><tr><th>Month</th><th>Tuition</th><th>Admission</th><th>Re-Adm</th><th>Exam</th><th>Computer</th><th>Late</th><th>Sports</th><th>TC</th><th>Misc</th><th>Total</th><th>Receipt No</th></tr>';
                data.months.forEach(monthRow => {
                    html += '<tr>';
                    monthRow.forEach(cell => {
                        html += `<td>${cell !== undefined ? cell : ''}</td>`;
                    });
                    html += '</tr>';
                });
                // Totals row
                html += '<tr><td><strong>Total</strong></td>';
                data.totals.slice(1, 11).forEach(total => { // skip first column (Month label) and last (Receipt)
                    html += `<td><strong>${total || 0}</strong></td>`;
                });
                html += '<td></td></tr>'; // empty for receipt column
                html += '</table>';

                document.getElementById('feeTable').innerHTML = html;
            } catch (err) {
                document.getElementById('feeTable').innerHTML = '<p class="error">Failed to load fee data.</p>';
            }
        }

        function logout() {
            currentStudentId = null;
            document.getElementById('loginDiv').style.display = 'block';
            document.getElementById('dataDiv').style.display = 'none';
            document.getElementById('studentId').value = '';
            document.getElementById('name').value = '';
            document.getElementById('mobile').value = '';
            document.getElementById('loginError').innerText = '';
        }
    </script>
</body>
</html>

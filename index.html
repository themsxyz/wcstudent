<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
</head>
<body>
<h2>ছাত্র/ছাত্রী ফি তথ্য</h2>

<label>Enter your Student ID:</label>
<input type="text" id="studentId">
<button onclick="loadStudentData()">Login</button>

<div id="studentData" style="display:none;">
<h3>Your Fee History</h3>
<table border="1" id="feeTable" style="border-collapse:collapse;">
<thead>
<tr>
<th>Month</th><th>Tuition</th><th>Admission</th><th>Re-Admission</th><th>Exam</th><th>Computer</th>
<th>Late</th><th>Sports</th><th>T.C</th><th>Miscellaneous</th><th>Payment Date</th><th>PDF</th>
</tr>
</thead>
<tbody></tbody>
</table>
<p id="totalFees"></p>
</div>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbxNKU4GFa_2XJSpvbMiaE5AFidUvpvHGRatGsgBFORm_cEuD0Ksm9OKIYI1CYLEN0C5UQ/exec"; // Apps Script URL

function loadStudentData(){
  const studentId = document.getElementById("studentId").value;
  fetch(webAppUrl+"?studentId="+studentId)
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert(data.error);
      return;
    }

    document.getElementById("studentData").style.display="block";
    const tbody = document.querySelector("#feeTable tbody");
    tbody.innerHTML="";

    let total = 0;
    for(let i=1;i<data.length;i++){ // skip header
      const row = data[i];
      const tr = document.createElement("tr");
      for(let j=0;j<row.length;j++){
        tr.innerHTML += "<td>"+row[j]+"</td>";
      }
      // PDF download button
      tr.innerHTML += `<td><button onclick="downloadPDF('${studentId}',${i+1})">PDF</button></td>`;
      tbody.appendChild(tr);

      // Calculate total fees
      for(let k=1;k<=9;k++) total += Number(row[k] || 0);
    }
    document.getElementById("totalFees").textContent = "Total Fees: "+total;
  });
}

function downloadPDF(studentId,rowIndex){
  fetch(webAppUrl+"?studentId="+studentId+"&pdfRow="+rowIndex)
  .then(res => res.blob())
  .then(blob=>{
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = studentId+"_receipt.pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();
  });
}
</script>
</body>
</html>
